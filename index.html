<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Past Tense Time Machine</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ffdae9; --blue: #d1eaed; --yellow: #fcf4dd;
            --text: #4a4a4a; --accent: #ff85a1; --green: #b4f8c8; --red: #ffabab;
        }

        body { font-family: 'Quicksand', sans-serif; background-color: #f0f4f8; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        #fullscreen-btn { position: absolute; top: 20px; right: 20px; z-index: 100; background: white; border: 2px solid var(--blue); border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .container { width: 96vw; height: 92vh; max-width: 1200px; background: white; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.12); position: relative; display: flex; flex-direction: column; }
        .slide { display: none; flex-direction: column; align-items: center; padding: 40px; height: 100%; box-sizing: border-box; overflow-y: auto; text-align: center; }
        .slide.active { display: flex; }

        h1 { font-family: 'Bungee'; color: var(--accent); font-size: 2.8rem; margin: 0; }
        h2 { font-family: 'Bungee'; color: var(--text); font-size: 1.8rem; }

        /* Word Hunt */
        .tile-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .tile { width: 55px; height: 55px; background: var(--yellow); border: 3px solid #f3e5ab; border-radius: 12px; font-size: 1.6rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .tile.used { opacity: 0.2; pointer-events: none; transform: scale(0.9); }

        /* Rules */
        .rule-box { background: var(--yellow); padding: 25px; border-radius: 30px; border: 5px dashed var(--accent); width: 85%; margin-top: 10px; }
        .formula { font-family: 'Bungee'; font-size: 2.2rem; color: var(--accent); letter-spacing: 2px; }

        /* Tug of War UI */
        .tug-container { width: 100%; display: flex; flex-direction: column; height: 100%; position: relative; }
        .battle-track { width: 100%; height: 130px; background: #e8f1f2; border-radius: 30px; position: relative; display: flex; align-items: center; border: 4px solid #ddd; margin: 15px 0; overflow: hidden;}
        .rope { position: absolute; width: 100%; height: 10px; background: #a67c52; top: 50%; }
        .puller { position: absolute; font-size: 4rem; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); top: 15%; }
        #tug-flag { position: absolute; left: 50%; transform: translateX(-50%); font-size: 2.5rem; top: 35%; transition: 0.4s; z-index: 10; }

        .battle-zones { display: flex; gap: 20px; flex: 1; min-height: 250px; }
        .zone { flex: 1; border-radius: 35px; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .p1-zone { background: var(--pink); border: 6px solid #ffb6c1; }
        .p2-zone { background: var(--blue); border: 6px solid #add8e6; }
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; margin-top: 10px; }

        /* Winner Overlay */
        #winner-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; }

        .btn { padding: 15px 30px; border: none; border-radius: 50px; font-family: 'Bungee'; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0px rgba(0,0,0,0.1); font-size: 1rem; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .opt-btn { background: white; font-size: 1.2rem; box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        .nav-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

<button id="fullscreen-btn" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>

<audio id="sfx-ok" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="sfx-no" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<div class="container" id="main-container">
    
    <div class="slide active">
        <h1>TIME TRAVELERS 🕒</h1>
        <p style="font-size: 1.5rem;">The "Yesterday" Mission</p>
        <img src="https://images.unsplash.com/photo-1501139083538-0139583c060f?auto=format&fit=crop&w=500&q=80" style="width: 300px; border-radius: 30px; border: 8px solid var(--blue);">
    </div>

    <!-- WARM UP -->
    <div class="slide">
        <h2>WARM UP: WORD HUNT 🕵️</h2>
        <div id="hunt-display" style="font-size: 3rem; color: var(--accent); height: 70px; border-bottom: 5px solid var(--blue); min-width: 300px; margin-bottom: 20px; font-family:'Bungee';"></div>
        <div class="tile-grid" id="hunt-tiles"></div>
        <div style="margin-bottom:15px;">
            <button class="btn" style="background:var(--red)" onclick="clearHunt()">CLEAR</button>
            <button class="btn" style="background:var(--green)" onclick="submitHunt()">ADD WORD</button>
        </div>
        <div id="found-log" style="display:flex; flex-wrap:wrap; gap:8px; padding:15px; background:#f8f8f8; border-radius:20px; width:90%; min-height:50px;"></div>
    </div>

    <!-- TUG OF WAR SLIDE -->
    <div class="slide">
        <h2 id="round-title">TUG-OF-WAR: ROUND 1/4</h2>
        <div class="tug-container">
            <div id="winner-overlay">
                <h1 id="win-text">TEAM PINK WINS!</h1>
                <p id="win-sub">Great job Travelers!</p>
                <button id="next-round-btn" class="btn" style="background:var(--green)" onclick="nextTugRound()">NEXT ROUND</button>
            </div>

            <div class="battle-track">
                <div class="rope"></div>
                <div id="p1-puller" class="puller" style="left:15%">👦</div>
                <div id="tug-flag">🚩</div>
                <div id="p2-puller" class="puller" style="right:15%; transform: scaleX(-1);">👧</div>
            </div>
            
            <div style="display:flex; justify-content: space-between; width: 100%; margin-bottom: 5px; font-weight: bold;">
                <span>WORDS: <span id="p1-count">0</span>/10</span>
                <span>WORDS: <span id="p2-count">0</span>/10</span>
            </div>

            <div class="battle-zones">
                <div class="zone p1-zone" id="p1-area">
                    <p>TEAM PINK</p>
                    <h3 id="p1-word" style="font-family:'Bungee';">GO</h3>
                    <div id="p1-options" class="opt-grid"></div>
                </div>
                <div class="zone p2-zone" id="p2-area">
                    <p>TEAM BLUE</p>
                    <h3 id="p2-word" style="font-family:'Bungee';">EAT</h3>
                    <div id="p2-options" class="opt-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="btn" style="background:var(--blue)" onclick="move(-1)">BACK</button>
        <div id="progress" style="font-family:'Bungee';">1 / 3</div>
        <button class="btn" style="background:var(--pink)" onclick="move(1)">NEXT</button>
    </div>
</div>

<script>
    let currentIdx = 0;
    const allSlides = document.querySelectorAll('.slide');
    let typed = "";
    let foundWords = [];

    // TUG OF WAR DATA
    let currentRound = 0;
    let flagPos = 50;
    let p1WordsDone = 0;
    let p2WordsDone = 0;
    const roundVerbs = [
        // ROUND 1: Daily Life
        [{pr: "GO", pa: "WENT", choices: ["GOED", "WENT", "GONE"]}, {pr: "EAT", pa: "ATE", choices: ["EATED", "ATE", "EATING"]}, {pr: "DRINK", pa: "DRANK", choices: ["DRINKED", "DRANK", "DRUNKEN"]}, {pr: "SLEEP", pa: "SLEPT", choices: ["SLEEPED", "SLEPT", "SLEEPING"]}, {pr: "RUN", pa: "RAN", choices: ["RUNNED", "RUNNING", "RAN"]}, {pr: "SIT", pa: "SAT", choices: ["SITTED", "SITTING", "SAT"]}, {pr: "DO", pa: "DID", choices: ["DOED", "DONE", "DID"]}, {pr: "HAVE", pa: "HAD", choices: ["HAVED", "HAD", "HAVING"]}, {pr: "COME", pa: "CAME", choices: ["COMED", "CAME", "COMING"]}, {pr: "READ", pa: "READ", choices: ["READED", "READ", "READING"]}],
        // ROUND 2: School Actions
        [{pr: "WRITE", pa: "WROTE", choices: ["WRITED", "WROTE", "WRITTEN"]}, {pr: "DRAW", pa: "DREW", choices: ["DRAWED", "DREW", "DRAWING"]}, {pr: "SING", pa: "SANG", choices: ["SINGED", "SUNG", "SANG"]}, {pr: "SPEAK", pa: "SPOKE", choices: ["SPEAKED", "SPOKE", "SPOKEN"]}, {pr: "THINK", pa: "THOUGHT", choices: ["THINKED", "THOUGHT", "THINKING"]}, {pr: "TEACH", pa: "TAUGHT", choices: ["TEACHED", "TAUGHT", "TEACHING"]}, {pr: "KNOW", pa: "KNEW", choices: ["KNOWED", "KNEW", "KNOWN"]}, {pr: "MAKE", pa: "MADE", choices: ["MAKED", "MADE", "MAKING"]}, {pr: "FIND", pa: "FOUND", choices: ["FINDED", "FOUND", "FINDING"]}, {pr: "TAKE", pa: "TOOK", choices: ["TAKED", "TOOK", "TAKEN"]}],
        // ROUND 3: Movement/Play
        [{pr: "FLY", pa: "FLEW", choices: ["FLYED", "FLOWN", "FLEW"]}, {pr: "SWIM", pa: "SWAM", choices: ["SWIMMED", "SWAM", "SWUM"]}, {pr: "THROW", pa: "THREW", choices: ["THROWED", "THREW", "THROWN"]}, {pr: "CATCH", pa: "CAUGHT", choices: ["CATCHED", "CAUGHT", "CATCHING"]}, {pr: "RIDE", pa: "RODE", choices: ["RIDED", "RODE", "RIDDEN"]}, {pr: "BUILD", pa: "BUILT", choices: ["BUILDED", "BUILT", "BUILDING"]}, {pr: "FALL", pa: "FELL", choices: ["FALLED", "FELL", "FALLEN"]}, {pr: "WAKE", pa: "WOKE", choices: ["WAKED", "WOKE", "WOKEN"]}, {pr: "GIVE", pa: "GAVE", choices: ["GIVED", "GAVE", "GIVEN"]}, {pr: "BUY", pa: "BOUGHT", choices: ["BUYED", "BOUGHT", "BUYING"]}],
        // ROUND 4: General Past
        [{pr: "SEE", pa: "SAW", choices: ["SEED", "SAW", "SEEN"]}, {pr: "SAY", pa: "SAID", choices: ["SAYED", "SAID", "SAYING"]}, {pr: "BREAK", pa: "BROKE", choices: ["BREAKED", "BROKE", "BROKEN"]}, {pr: "BEGIN", pa: "BEGAN", choices: ["BEGINNED", "BEGUN", "BEGAN"]}, {pr: "CHOOSE", pa: "CHOSE", choices: ["CHOOSED", "CHOSE", "CHOSEN"]}, {pr: "FORGET", pa: "FORGOT", choices: ["FORGETTED", "FORGOT", "FORGOTTEN"]}, {pr: "KEEP", pa: "KEPT", choices: ["KEEPED", "KEPT", "KEEPING"]}, {pr: "LEAVE", pa: "LEFT", choices: ["LEAVED", "LEFT", "LEAVING"]}, {pr: "SEND", pa: "SENT", choices: ["SENDED", "SENT", "SENDING"]}, {pr: "TELL", pa: "TOLD", choices: ["TELLED", "TOLD", "TELLING"]}]
    ];

    const huntDict = ["SEE", "STAYED", "STARED", "STEADY", "TRADES", "TREADS", "TEASER", "TEARED", "YEARED", "YEARS", "YEAST", "YEARN", "TEARS", "RATES", "STARE", "STRAY", "TRADE", "TREAD", "READY", "DEARS", "DATES", "RATED", "DRYER", "SAYER", "STEAD", "TREES", "YEAR", "YARE", "EAST", "EASY", "EARS", "ERAS", "TEAS", "SEAT", "RATE", "READ", "DEAR", "DARE", "DATE", "DRAY", "TRAY", "STAY", "STAR", "REST", "REAR", "TREE", "TEAR", "SEED", "REED", "RISE", "YES", "YET", "DAY", "DYE", "DRY", "SAY", "SEA", "SET", "SAT", "SAD", "ATE", "EAT", "TEA", "EAR", "ERA", "ARE", "RED", "RYE", "TRY", "ART", "RAT", "TAR"];

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function move(dir) {
        allSlides[currentIdx].classList.remove('active');
        currentIdx = Math.max(0, Math.min(allSlides.length - 1, currentIdx + dir));
        allSlides[currentIdx].classList.add('active');
        document.getElementById('progress').innerText = `${currentIdx + 1} / ${allSlides.length}`;
        if(currentIdx === 1) setupHunt();
        if(currentIdx === 2) startTug();
    }

    /* WORD HUNT */
    function setupHunt() {
        const grid = document.getElementById('hunt-tiles'); grid.innerHTML = '';
        "YESTERDAY".split('').forEach(l => {
            const t = document.createElement('div'); t.className = 'tile'; t.innerText = l;
            t.onclick = () => { typed += l; document.getElementById('hunt-display').innerText = typed; t.classList.add('used'); };
            grid.appendChild(t);
        });
    }
    function clearHunt() { typed = ""; document.getElementById('hunt-display').innerText = ""; document.querySelectorAll('.tile').forEach(t=>t.classList.remove('used')); }
    function submitHunt() {
        if(huntDict.includes(typed) && !foundWords.includes(typed)) {
            document.getElementById('sfx-ok').play();
            foundWords.push(typed);
            const s = document.createElement('span'); s.innerText = typed; s.style="background:var(--green); padding:8px 12px; border-radius:12px; font-weight:bold;";
            document.getElementById('found-log').prepend(s);
        } else { document.getElementById('sfx-no').play(); }
        clearHunt();
    }

    /* TUG OF WAR CORE */
    function startTug() {
        flagPos = 50; p1WordsDone = 0; p2WordsDone = 0;
        document.getElementById('winner-overlay').style.display = 'none';
        document.getElementById('round-title').innerText = `TUG-OF-WAR: ROUND ${currentRound + 1}/4`;
        updateTugUI();
        loadWord(1); loadWord(2);
    }

    function updateTugUI() {
        document.getElementById('tug-flag').style.left = flagPos + "%";
        document.getElementById('p1-count').innerText = p1WordsDone;
        document.getElementById('p2-count').innerText = p2WordsDone;
        
        // Win Check
        if(flagPos <= 5 || p1WordsDone >= 10) showWinner("TEAM PINK");
        else if(flagPos >= 95 || p2WordsDone >= 10) showWinner("TEAM BLUE");
    }

    function loadWord(p) {
        const words = roundVerbs[currentRound];
        const count = p === 1 ? p1WordsDone : p2WordsDone;
        if(count >= 10) return;

        const verb = words[count];
        document.getElementById(`p${p}-word`).innerText = verb.pr;
        const container = document.getElementById(`p${p}-options`);
        container.innerHTML = '';

        // Shuffle choices
        const shuffled = [...verb.choices].sort(() => Math.random() - 0.5);

        shuffled.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn opt-btn';
            btn.innerText = choice;
            btn.onclick = () => {
                if(choice === verb.pa) {
                    document.getElementById('sfx-ok').play();
                    flagPos += (p === 1 ? -8 : 8); // Pink pulls left (-), Blue pulls right (+)
                    if(p === 1) p1WordsDone++; else p2WordsDone++;
                    updateTugUI();
                    loadWord(p);
                } else {
                    document.getElementById('sfx-no').play();
                    btn.style.background = "var(--red)";
                    setTimeout(() => btn.style.background = "white", 500);
                }
            };
            container.appendChild(btn);
        });
    }

    function showWinner(team) {
        const overlay = document.getElementById('winner-overlay');
        const text = document.getElementById('win-text');
        overlay.style.display = 'flex';
        text.innerText = `${team} WINS!`;
        text.style.color = team === "TEAM PINK" ? "var(--accent)" : "#3498db";
        
        // Hide next button if on last round
        document.getElementById('next-round-btn').style.display = currentRound < 3 ? 'block' : 'none';
        if(currentRound === 3) document.getElementById('win-sub').innerText = "Congratulations! You finished all 4 rounds!";
    }

    function nextTugRound() {
        currentRound++;
        startTug();
    }
</script>
</body>
</html>
